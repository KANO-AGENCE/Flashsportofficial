version: "3.9"

services:
  # --- Base de donnees ---
  db:
    image: postgres:16-alpine
    container_name: flashsport_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: flashsport
      POSTGRES_PASSWORD: flashsport_pwd
      POSTGRES_DB: flashsport_tri
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashsport -d flashsport_tri"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Backend FastAPI ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flashsport_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://flashsport:flashsport_pwd@db/flashsport_tri
      UPLOAD_DIR: /app/uploads
      OLLAMA_URL: http://host.docker.internal:11434
      JWT_SECRET: flashsport-local-secret-change-in-prod
      CORS_ORIGINS: "http://localhost,http://flashsport.app,http://boutique.flashsport.app,http://localhost:5173,http://localhost:5174"
    volumes:
      - uploads:/app/uploads
    ports:
      - "8000:8000"

  # --- Build Frontend Admin ---
  frontend-admin:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flashsport_admin_build
    volumes:
      - admin_dist:/output

  # --- Build Frontend Boutique ---
  frontend-boutique:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    container_name: flashsport_boutique_build
    volumes:
      - boutique_dist:/output

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: flashsport_proxy
    restart: unless-stopped
    depends_on:
      - backend
      - frontend-admin
      - frontend-boutique
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - admin_dist:/usr/share/nginx/html/admin:ro
      - boutique_dist:/usr/share/nginx/html/boutique:ro

volumes:
  pgdata:
  uploads:
  admin_dist:
  boutique_dist:
