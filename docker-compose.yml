version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: flashsport_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: flashsport
      POSTGRES_PASSWORD: flashsport_pwd
      POSTGRES_DB: flashsport_tri
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
