upstream backend {
    server backend:8000;
}

# Admin — flashsport.app
server {
    listen 80;
    server_name flashsport.app;

    client_max_body_size 500M;

    # API
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Uploads (photos)
    location /uploads/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Frontend admin (Vue)
    location / {
        root /usr/share/nginx/html/admin;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

# Boutique — boutique.flashsport.app
server {
    listen 80;
    server_name boutique.flashsport.app;

    client_max_body_size 50M;

    # API
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Uploads (photos/thumbnails)
    location /uploads/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Frontend boutique (Vue)
    location / {
        root /usr/share/nginx/html/boutique;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

# Fallback — localhost ou IP directe
server {
    listen 80 default_server;

    client_max_body_size 500M;

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /uploads/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location / {
        root /usr/share/nginx/html/admin;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
